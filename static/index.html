<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Data — Tableau → Power BI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface-2: #1a2438;
  --surface-3: #232d42;
  --text: #f0f4ff;
  --text-dim: #8899bb;
  --text-muted: #5a6a88;
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.12);
  --gold: #ffd700;
  --gold-dim: rgba(255,215,0,0.12);
  --red: #ff4466;
  --red-dim: rgba(255,68,102,0.12);
  --blue: #4488ff;
  --blue-dim: rgba(68,136,255,0.12);
  --border: #1e2d44;
  --radius: 12px;
  --radius-sm: 8px;
}

html, body { height: 100%; font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); }
code, pre, .mono { font-family: 'IBM Plex Mono', monospace; }

/* ===== LAYOUT ===== */
.app { display: flex; flex-direction: column; height: 100vh; }

/* --- HEADER --- */
.header {
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; height: 52px; min-height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.header-logo {
  font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px;
  color: var(--green); letter-spacing: -0.03em;
}
.header-logo span { color: var(--text-dim); font-weight: 400; }
.header-status {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted);
}
.header-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  animation: pulse 2s infinite;
}
.header-dot.off { background: var(--red); animation: none; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.session-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); }

/* --- UPLOAD ZONE --- */
.upload-zone {
  margin: 16px 24px 0; padding: 28px 20px;
  border: 2px dashed var(--border); border-radius: var(--radius);
  background: var(--surface); text-align: center; cursor: pointer;
  transition: all .2s;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--green); background: var(--green-dim);
}
.upload-zone.has-file {
  border-color: var(--green); border-style: solid;
  background: var(--green-dim); padding: 14px 20px;
}
.upload-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
.upload-title { font-size: 14px; font-weight: 600; color: var(--text); }
.upload-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.upload-file-info {
  display: flex; align-items: center; gap: 12px; justify-content: center;
}
.upload-file-name { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--green); font-weight: 600; }
.upload-file-meta { font-size: 12px; color: var(--text-dim); }
.upload-file-clear {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-muted); font-size: 11px; padding: 3px 10px; cursor: pointer;
}
.upload-file-clear:hover { border-color: var(--red); color: var(--red); }
.upload-progress {
  margin-top: 10px; height: 3px; border-radius: 2px; background: var(--surface-2);
  overflow: hidden;
}
.upload-progress-bar {
  height: 100%; background: var(--green); width: 0%; transition: width .3s;
}
#upload-input { display: none; }

/* --- CHAT AREA --- */
.chat-area {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}

/* --- MESSAGES --- */
.msg {
  display: flex; gap: 12px; max-width: 820px;
  animation: fadeIn .25s ease;
}
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg-avatar {
  width: 32px; height: 32px; min-width: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; margin-top: 2px;
}
.msg.bot .msg-avatar { background: var(--green-dim); color: var(--green); }
.msg.user .msg-avatar { background: var(--blue-dim); color: var(--blue); }

.msg-body {
  padding: 14px 18px; border-radius: var(--radius);
  font-size: 14px; line-height: 1.6; min-width: 80px;
}
.msg.bot .msg-body {
  background: var(--surface); border: 1px solid var(--border);
  border-top-left-radius: 4px;
}
.msg.user .msg-body {
  background: var(--surface-2); border: 1px solid var(--border);
  border-top-right-radius: 4px; color: var(--text);
}

/* Message content formatting */
.msg-body p { margin-bottom: 8px; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body strong { color: var(--green); font-weight: 600; }

/* --- CODE BLOCKS (DAX) --- */
.dax-block {
  margin: 12px 0; border-radius: var(--radius-sm); overflow: hidden;
  border: 1px solid var(--border);
}
.dax-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; background: var(--surface-3);
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-muted);
}
.dax-header-actions { display: flex; gap: 6px; }
.dax-btn {
  padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface);
  color: var(--text-dim); transition: all .15s;
}
.dax-btn:hover { border-color: var(--blue); color: var(--blue); }
.dax-btn.edit-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.dax-btn.copy-btn:hover { border-color: var(--green); color: var(--green); }
.dax-btn.save-btn { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.dax-btn.cancel-btn { border-color: var(--red); color: var(--red); }
.dax-code {
  padding: 14px; background: #060a12; font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap;
  overflow-x: auto;
}
.dax-edit-area {
  width: 100%; padding: 14px; background: #060a12; border: none;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.5;
  color: var(--blue); resize: vertical; min-height: 80px; outline: none;
}

/* --- FIELD MAPPING TABLE --- */
.field-table {
  margin: 12px 0; border-radius: var(--radius-sm); overflow: hidden;
  border: 1px solid var(--border);
}
.field-table table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.field-table th {
  padding: 8px 12px; background: var(--surface-3);
  text-align: left; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.field-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
}
.field-table tr:last-child td { border-bottom: none; }
.field-table .col-tableau { color: var(--text-dim); }
.field-table .col-pbi { color: var(--green); }
.field-table .col-type { color: var(--gold); font-size: 11px; }
.field-table .col-actions { text-align: right; }
.field-table .col-actions button {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface);
  color: var(--text-dim); margin-left: 4px; transition: all .15s;
}
.field-table .accept-btn:hover { border-color: var(--green); color: var(--green); }
.field-table .edit-field-btn:hover { border-color: var(--blue); color: var(--blue); }

/* --- DATA SOURCE CARDS --- */
.ds-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0;
}
.ds-card {
  padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface-2); cursor: pointer; transition: all .2s;
  text-align: center;
}
.ds-card:hover { border-color: var(--green); background: var(--green-dim); transform: translateY(-2px); }
.ds-card-icon { font-size: 24px; margin-bottom: 6px; }
.ds-card-title { font-size: 13px; font-weight: 600; color: var(--text); }
.ds-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* --- QA RESULTS --- */
.qa-block {
  margin: 12px 0; padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--gold); background: var(--gold-dim);
}
.qa-title { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.qa-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 13px; }
.qa-pass { color: var(--green); }
.qa-fail { color: var(--red); }
.qa-warn { color: var(--gold); }

/* --- DOWNLOAD BUTTONS --- */
.dl-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
.dl-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--green); background: var(--green-dim);
  color: var(--green); font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: all .15s;
}
.dl-btn:hover { background: var(--green); color: var(--bg); }

/* --- ERROR BLOCK --- */
.error-block {
  margin: 12px 0; padding: 12px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--red); background: var(--red-dim);
  font-size: 13px; color: var(--red);
}

/* --- TYPING INDICATOR --- */
.typing { display: flex; gap: 4px; padding: 8px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
  animation: typingDot 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typingDot { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

/* --- INPUT BAR --- */
.input-bar {
  padding: 16px 24px; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
}
.input-wrap {
  flex: 1; position: relative;
}
.input-wrap textarea {
  width: 100%; padding: 12px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface-2);
  color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px;
  resize: none; outline: none; transition: border-color .15s;
  min-height: 44px; max-height: 160px; line-height: 1.5;
}
.input-wrap textarea::placeholder { color: var(--text-muted); }
.input-wrap textarea:focus { border-color: var(--green); }
.send-btn {
  width: 44px; height: 44px; border-radius: var(--radius);
  border: none; background: var(--green); color: var(--bg);
  font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all .15s;
  flex-shrink: 0;
}
.send-btn:hover { background: #00cc6e; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* --- WELCOME --- */
.welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 12px; text-align: center; padding: 40px;
}
.welcome-icon { font-size: 48px; opacity: 0.3; }
.welcome h2 { font-size: 20px; font-weight: 600; color: var(--text); }
.welcome p { font-size: 14px; color: var(--text-muted); max-width: 420px; line-height: 1.6; }

/* --- PIPELINE BANNER --- */
.pipeline-banner {
  margin: 0 24px; padding: 10px 16px; border-radius: var(--radius-sm);
  background: var(--surface-2); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; font-size: 12px;
}
.pipeline-banner.hidden { display: none; }
.pipeline-stage {
  font-family: 'IBM Plex Mono', monospace; font-weight: 600;
  color: var(--gold); text-transform: uppercase; font-size: 11px;
}
.pipeline-label { color: var(--text-muted); }
.pipeline-dots { display: flex; gap: 4px; margin-left: auto; }
.pipeline-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--surface-3); border: 1px solid var(--border);
}
.pipeline-dot.done { background: var(--green); border-color: var(--green); }
.pipeline-dot.active { background: var(--gold); border-color: var(--gold); animation: pulse 1.5s infinite; }

/* Scrollbar */
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
.chat-area::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Mobile */
@media (max-width: 640px) {
  .msg { max-width: 100%; }
  .ds-cards { grid-template-columns: 1fr; }
  .header { padding: 0 14px; }
  .chat-area { padding: 14px; }
  .input-bar { padding: 12px 14px; }
  .upload-zone { margin: 10px 14px 0; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">Dr. Data <span>v2</span></div>
    <span class="session-id" id="session-display"></span>
    <div class="header-status">
      <div class="header-dot" id="health-dot"></div>
      <span id="health-label">connecting...</span>
    </div>
  </div>

  <!-- UPLOAD ZONE -->
  <div class="upload-zone" id="upload-zone">
    <div id="upload-empty">
      <div class="upload-icon">&#8593;</div>
      <div class="upload-title">Drop your .twbx or .twb file here</div>
      <div class="upload-sub">or click to browse — Tableau workbooks only</div>
    </div>
    <div id="upload-loaded" style="display:none">
      <div class="upload-file-info">
        <span class="upload-file-name" id="upload-fname"></span>
        <span class="upload-file-meta" id="upload-fmeta"></span>
        <button class="upload-file-clear" id="upload-clear">Clear</button>
      </div>
    </div>
    <div class="upload-progress" id="upload-progress" style="display:none">
      <div class="upload-progress-bar" id="upload-bar"></div>
    </div>
  </div>
  <input type="file" id="upload-input" accept=".twbx,.twb">

  <!-- PIPELINE BANNER -->
  <div class="pipeline-banner hidden" id="pipeline-banner">
    <span class="pipeline-label">Pipeline:</span>
    <span class="pipeline-stage" id="pipeline-stage">—</span>
    <div class="pipeline-dots" id="pipeline-dots"></div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&#9670;</div>
      <h2>Dr. Data is ready</h2>
      <p>Upload a Tableau workbook above, then tell me what you need. I'll parse it, map fields, translate DAX, run QA, and build your Power BI project.</p>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="chat-input" placeholder="Ask Dr. Data anything..." rows="1"></textarea>
    </div>
    <button class="send-btn" id="send-btn" title="Send">&#9654;</button>
  </div>

</div>

<script>
// ============================================================
//  STATE
// ============================================================
const S = {
  sessionId: 'ses_' + Math.random().toString(36).slice(2, 10),
  fileId: null,
  fileName: null,
  sending: false,
  pipeline: null,
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const chatArea   = $('#chat-area');
const chatInput  = $('#chat-input');
const sendBtn    = $('#send-btn');
const uploadZone = $('#upload-zone');
const uploadInput= $('#upload-input');
const welcome    = $('#welcome');

$('#session-display').textContent = S.sessionId;

// ============================================================
//  HEALTH CHECK
// ============================================================
async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    if (r.ok) {
      $('#health-dot').classList.remove('off');
      $('#health-label').textContent = 'online';
    } else throw 0;
  } catch {
    $('#health-dot').classList.add('off');
    $('#health-label').textContent = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ============================================================
//  UPLOAD
// ============================================================
uploadZone.addEventListener('click', () => { if (!S.fileId) uploadInput.click(); });
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
uploadInput.addEventListener('change', () => { if (uploadInput.files.length) handleFile(uploadInput.files[0]); });
$('#upload-clear').addEventListener('click', (e) => {
  e.stopPropagation();
  S.fileId = null; S.fileName = null;
  uploadZone.classList.remove('has-file');
  $('#upload-empty').style.display = '';
  $('#upload-loaded').style.display = 'none';
  uploadInput.value = '';
});

async function handleFile(file) {
  if (!file.name.match(/\.twbx?$/i)) {
    addBotMessage('<div class="error-block">Only .twb and .twbx files are supported.</div>');
    return;
  }

  // Show progress
  $('#upload-progress').style.display = 'block';
  $('#upload-bar').style.width = '30%';

  const form = new FormData();
  form.append('file', file);

  try {
    $('#upload-bar').style.width = '60%';
    const r = await fetch('/api/upload', { method: 'POST', body: form });
    $('#upload-bar').style.width = '90%';
    const data = await r.json();

    S.fileId = data.file_id;
    S.fileName = data.filename;

    // Show file info
    uploadZone.classList.add('has-file');
    $('#upload-empty').style.display = 'none';
    $('#upload-loaded').style.display = '';
    $('#upload-fname').textContent = data.filename;
    $('#upload-fmeta').textContent = formatBytes(data.size);

    // Bot message with parse results
    if (data.analysis) {
      hideWelcome();
      addBotMessage(renderParseResult(data));
    }

    $('#upload-bar').style.width = '100%';
    setTimeout(() => { $('#upload-progress').style.display = 'none'; $('#upload-bar').style.width = '0%'; }, 600);
  } catch (err) {
    $('#upload-progress').style.display = 'none';
    addBotMessage(`<div class="error-block">Upload failed: ${err.message}</div>`);
  }
}

function renderParseResult(data) {
  const fi = data.file_info || {};
  let html = `<p><strong>${data.filename}</strong> uploaded and parsed.</p>`;
  if (fi.worksheets !== undefined) {
    html += `<div class="field-table"><table>
      <tr><th>Component</th><th>Count</th></tr>
      <tr><td class="col-tableau">Worksheets</td><td class="col-pbi">${fi.worksheets}</td></tr>
      <tr><td class="col-tableau">Dashboards</td><td class="col-pbi">${fi.dashboards}</td></tr>
      <tr><td class="col-tableau">Calculated Fields</td><td class="col-pbi">${fi.calc_fields}</td></tr>
    </table></div>`;
  }
  html += `<p style="color:var(--text-dim);font-size:13px;margin-top:8px">Tell me to <strong>convert to Power BI</strong> when ready, or ask me anything about this workbook.</p>`;
  return html;
}

// ============================================================
//  CHAT
// ============================================================
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
});

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || S.sending) return;

  hideWelcome();
  addUserMessage(text);
  chatInput.value = '';
  chatInput.style.height = 'auto';

  S.sending = true;
  sendBtn.disabled = true;
  const typingEl = addTypingIndicator();

  try {
    const body = {
      message: text,
      session_id: S.sessionId,
      file_id: S.fileId || '',
      context: '',
    };
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    typingEl.remove();

    // Update pipeline state
    if (data.pipeline) {
      S.pipeline = data.pipeline;
      updatePipelineBanner(data.pipeline);
    }

    // Render response
    const html = renderResponse(data);
    addBotMessage(html);

    // Handle downloadable files
    if (data.files && data.files.length) {
      addBotMessage(renderDownloads(data.files));
    }

  } catch (err) {
    typingEl.remove();
    addBotMessage(`<div class="error-block">Request failed: ${err.message}</div>`);
  } finally {
    S.sending = false;
    sendBtn.disabled = false;
    chatInput.focus();
  }
}

// ============================================================
//  RESPONSE RENDERER
// ============================================================
function renderResponse(data) {
  let text = data.response || '';
  const intent = data.intent || 'chat';

  // Check for data_source choice stage
  if (text.toLowerCase().includes('data source') && S.pipeline && S.pipeline.current_stage === 'data_source') {
    return renderTextWithMarkup(text) + renderDataSourceCards();
  }

  // Check for field mapping content
  if (text.includes('|') && (text.includes('Tableau') || text.includes('Field') || text.includes('Power BI'))) {
    return renderWithFieldTable(text);
  }

  // Check for QA content
  if (intent === 'pipeline' && (text.toLowerCase().includes('qa') || text.toLowerCase().includes('validation') || text.toLowerCase().includes('quality'))) {
    return renderWithQA(text);
  }

  // General: parse code blocks and render
  return renderTextWithMarkup(text);
}

function renderTextWithMarkup(text) {
  // Split by code fences
  const parts = text.split(/(```[\s\S]*?```)/g);
  let html = '';
  for (const part of parts) {
    if (part.startsWith('```')) {
      const match = part.match(/```(\w*)\n?([\s\S]*?)```/);
      if (match) {
        const lang = match[1] || 'dax';
        const code = match[2].trim();
        html += renderDaxBlock(code, lang);
      }
    } else {
      // Convert markdown-lite
      let p = escapeHtml(part);
      p = p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      p = p.replace(/`([^`]+)`/g, '<code style="background:var(--surface-3);padding:1px 5px;border-radius:3px;font-size:12px;">$1</code>');
      p = p.replace(/\n\n+/g, '</p><p>');
      p = p.replace(/\n/g, '<br>');
      html += `<p>${p}</p>`;
    }
  }
  return html;
}

function renderDaxBlock(code, lang, fieldName) {
  const id = 'dax_' + Math.random().toString(36).slice(2, 8);
  const label = lang.toUpperCase() || 'DAX';
  const field = fieldName ? ` data-field="${escapeAttr(fieldName)}"` : '';
  return `<div class="dax-block" id="${id}"${field}>
    <div class="dax-header">
      <span>${label}${fieldName ? ' — ' + escapeHtml(fieldName) : ''}</span>
      <div class="dax-header-actions">
        <button class="dax-btn copy-btn" onclick="copyDax('${id}')">Copy</button>
        <button class="dax-btn edit-btn" onclick="editDax('${id}')">Edit</button>
      </div>
    </div>
    <div class="dax-code">${escapeHtml(code)}</div>
  </div>`;
}

function renderWithFieldTable(text) {
  // Try to extract markdown table and render as styled table
  const lines = text.split('\n');
  let tableLines = [];
  let before = [];
  let after = [];
  let inTable = false;
  let pastTable = false;

  for (const line of lines) {
    if (!pastTable && line.trim().startsWith('|') && line.trim().endsWith('|')) {
      inTable = true;
      if (!line.match(/^\|[\s-:|]+\|$/)) tableLines.push(line);
    } else {
      if (inTable) { pastTable = true; inTable = false; }
      if (pastTable) after.push(line); else before.push(line);
    }
  }

  let html = before.length ? renderTextWithMarkup(before.join('\n')) : '';

  if (tableLines.length) {
    const headers = tableLines[0].split('|').filter(c => c.trim()).map(c => c.trim());
    html += '<div class="field-table"><table><tr>';
    for (const h of headers) html += `<th>${escapeHtml(h)}</th>`;
    html += '<th>Actions</th></tr>';
    for (let i = 1; i < tableLines.length; i++) {
      const cells = tableLines[i].split('|').filter(c => c.trim()).map(c => c.trim());
      html += '<tr>';
      for (let j = 0; j < cells.length; j++) {
        const cls = j === 0 ? 'col-tableau' : j === cells.length - 1 ? 'col-type' : 'col-pbi';
        html += `<td class="${cls}">${escapeHtml(cells[j])}</td>`;
      }
      const fieldName = cells[0] || '';
      html += `<td class="col-actions">
        <button class="accept-btn" onclick="acceptField('${escapeAttr(fieldName)}')">Accept</button>
        <button class="edit-field-btn" onclick="editField('${escapeAttr(fieldName)}')">Edit</button>
      </td></tr>`;
    }
    html += '</table></div>';
  }

  if (after.length) html += renderTextWithMarkup(after.join('\n'));
  return html;
}

function renderWithQA(text) {
  // Parse QA pass/fail lines
  const lines = text.split('\n');
  let qaItems = [];
  let otherLines = [];
  for (const line of lines) {
    const pass = line.match(/[✓✅☑]\s*(.*)/);
    const fail = line.match(/[✗❌☒✘]\s*(.*)/);
    const warn = line.match(/[⚠⚡]\s*(.*)/);
    if (pass) qaItems.push({ status: 'pass', text: pass[1] });
    else if (fail) qaItems.push({ status: 'fail', text: fail[1] });
    else if (warn) qaItems.push({ status: 'warn', text: warn[1] });
    else otherLines.push(line);
  }

  let html = renderTextWithMarkup(otherLines.join('\n'));
  if (qaItems.length) {
    html += '<div class="qa-block"><div class="qa-title">QA Validation</div>';
    for (const item of qaItems) {
      const icon = item.status === 'pass' ? '&#10003;' : item.status === 'fail' ? '&#10007;' : '&#9888;';
      html += `<div class="qa-item qa-${item.status}">${icon} ${escapeHtml(item.text)}</div>`;
    }
    html += '</div>';
  }
  return html;
}

function renderDownloads(files) {
  let html = '<div class="dl-buttons">';
  for (const f of files) {
    const name = f.filename || f.name || 'Download';
    const url = f.url || f.path || '#';
    html += `<a class="dl-btn" href="${escapeAttr(url)}" download>&#8615; ${escapeHtml(name)}</a>`;
  }
  html += '</div>';
  return html;
}

// ============================================================
//  DAX EDITING
// ============================================================
window.copyDax = function(id) {
  const el = document.querySelector(`#${id} .dax-code`);
  if (el) navigator.clipboard.writeText(el.textContent);
};

window.editDax = function(id) {
  const block = document.getElementById(id);
  const codeEl = block.querySelector('.dax-code');
  const code = codeEl.textContent;
  const field = block.dataset.field || '';

  codeEl.innerHTML = `<textarea class="dax-edit-area">${escapeHtml(code)}</textarea>`;

  const actions = block.querySelector('.dax-header-actions');
  actions.innerHTML = `
    <button class="dax-btn save-btn" onclick="saveDax('${id}','${escapeAttr(field)}')">Save</button>
    <button class="dax-btn cancel-btn" onclick="cancelDax('${id}','${escapeAttr(escapeHtml(code))}')">Cancel</button>`;

  block.querySelector('.dax-edit-area').focus();
};

window.saveDax = function(id, fieldName) {
  const block = document.getElementById(id);
  const textarea = block.querySelector('.dax-edit-area');
  const newCode = textarea.value;

  // Restore display
  const codeEl = block.querySelector('.dax-code');
  codeEl.textContent = newCode;
  const actions = block.querySelector('.dax-header-actions');
  actions.innerHTML = `
    <button class="dax-btn copy-btn" onclick="copyDax('${id}')">Copy</button>
    <button class="dax-btn edit-btn" onclick="editDax('${id}')">Edit</button>`;

  // Send correction via chat
  const msg = fieldName
    ? `EDIT_FORMULA:${fieldName}:${newCode}`
    : `EDIT_DAX:${newCode}`;
  sendChatMessage(msg);
};

window.cancelDax = function(id, origCode) {
  const block = document.getElementById(id);
  block.querySelector('.dax-code').textContent = origCode;
  const actions = block.querySelector('.dax-header-actions');
  actions.innerHTML = `
    <button class="dax-btn copy-btn" onclick="copyDax('${id}')">Copy</button>
    <button class="dax-btn edit-btn" onclick="editDax('${id}')">Edit</button>`;
};

// ============================================================
//  DATA SOURCE + FIELD ACTIONS
// ============================================================
window.pickDataSource = function(choice) {
  sendChatMessage(`DATA_SOURCE:${choice}`);
};

window.acceptField = function(name) {
  // Visual feedback — could also send to backend
  addBotMessage(`<p style="font-size:13px;color:var(--green)">&#10003; Field <strong>${escapeHtml(name)}</strong> accepted.</p>`);
};

window.editField = function(name) {
  chatInput.value = `EDIT_FORMULA:${name}:`;
  chatInput.focus();
};

// ============================================================
//  CHAT HELPERS
// ============================================================
function sendChatMessage(text) {
  chatInput.value = text;
  sendMessage();
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">Y</div><div class="msg-body">${escapeHtml(text)}</div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function addBotMessage(html) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">D</div><div class="msg-body">${html}</div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">D</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function hideWelcome() {
  if (welcome) welcome.style.display = 'none';
}

function scrollBottom() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

// ============================================================
//  PIPELINE BANNER
// ============================================================
const PIPELINE_STAGES = ['parse', 'data_source', 'field_mapping', 'dax_translation', 'visual_mapping', 'qa', 'build'];

function updatePipelineBanner(p) {
  if (!p) return;
  const banner = $('#pipeline-banner');
  banner.classList.remove('hidden');
  $('#pipeline-stage').textContent = (p.current_stage || 'complete').replace('_', ' ');

  const dotsEl = $('#pipeline-dots');
  dotsEl.innerHTML = '';
  const completed = p.completed_stages || [];
  for (const stage of PIPELINE_STAGES) {
    const dot = document.createElement('div');
    dot.className = 'pipeline-dot';
    dot.title = stage.replace('_', ' ');
    if (completed.includes(stage)) dot.classList.add('done');
    else if (stage === p.current_stage) dot.classList.add('active');
    dotsEl.appendChild(dot);
  }
}

// ============================================================
//  UTILITIES
// ============================================================
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  if (!s) return '';
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
